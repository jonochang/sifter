name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo fmt
        run: nix develop --command cargo fmt --all --check
      - name: cargo clippy
        run: nix develop --command cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo deny
        run: nix develop --command cargo deny check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo nextest
        run: nix develop --command cargo nextest run --workspace --all-features --profile ci
      - name: upload nextest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-results
          path: target/nextest/ci/results.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo build
        run: nix develop --command cargo build --workspace --all-features
